<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Static site</title>
  <meta http-equiv="refresh" content="2; url=en/index.html">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #1f2933;
      --muted: #66717f;
      --line: #d8dee6;
      --accent: #a84b20;
      --panel: #f7f8fa;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(640px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      min-height: 44px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      padding: 8px 14px;
      color: var(--accent);
      font-weight: 750;
      text-decoration: none;
    }

    a:focus-visible,
    a:hover {
      border-color: var(--accent);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111418;
        --text: #e7edf4;
        --muted: #a7b0bd;
        --line: #313945;
        --accent: #f0a06b;
        --panel: #171c23;
      }
    }
  </style>
  <script>
    function detectPreferredLocale() {
      var browserLocales = navigator.languages && navigator.languages.length
        ? navigator.languages
        : [navigator.language || ""];
      var systemLocale = "";

      try {
        systemLocale = Intl.DateTimeFormat().resolvedOptions().locale || "";
      } catch (error) {
        systemLocale = "";
      }

      return browserLocales.concat(systemLocale).some(function (locale) {
        return String(locale).toLowerCase().startsWith("zh");
      }) ? "zh-TW" : "en";
    }

    var targetLocale = detectPreferredLocale();
    window.location.replace(targetLocale + "/index.html");
  </script>
</head>
<body>
  <main>
    <h1>Static site</h1>
    <p>
      The site will open in your browser language. If it does not redirect, choose a language below.
      本頁會依瀏覽器語系開啟網站；若沒有自動跳轉，請手動選擇語系。
    </p>
    <div class="links">
      <a href="en/index.html" lang="en">English</a>
      <a href="zh-TW/index.html" lang="zh-Hant">台灣繁體中文</a>
    </div>
  </main>
</body>
</html>
